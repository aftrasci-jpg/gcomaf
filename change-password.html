<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="assets/argon/img/logo.png">
  <link rel="icon" type="image/png" href="assets/argon/img/logo.png">
  <title>Changer le mot de passe - CRM Gcomaf</title>
  <!--     Fonts and icons     -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <!-- Nucleo Icons -->
  <link href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-icons.css" rel="stylesheet" />
  <link href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-svg.css" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <!-- CSS Files -->
  <link id="pagestyle" href="assets/argon/css/argon-dashboard.css?v=2.1.0" rel="stylesheet" />
  <link href="assets/argon/css/custom.css" rel="stylesheet" />
</head>

<body class="bg-gray-100">
  <div class="login-wrapper">
    <div class="card login-card shadow-lg">
      <div class="card-header text-center pb-0">
        <div class="text-center mb-3">
          <img src="assets/argon/img/logo.png" alt="Gcomaf Logo" class="logo-login">
        </div>
        <h3 class="font-weight-bolder text-dark">Changer le mot de passe</h3>
        <p class="text-muted mb-0">Définissez un nouveau mot de passe sécurisé</p>
      </div>
      <div class="card-body">
        <div id="error-message" class="alert alert-danger" style="display: none;" role="alert" aria-live="polite"></div>
        <div id="success-message" class="alert alert-success" style="display: none;" role="alert" aria-live="polite"></div>

        <form id="change-password-form">
          <div class="form-group mb-3">
            <label for="new-password" class="form-label">Nouveau mot de passe</label>
            <input type="password" id="new-password" class="form-control" placeholder="Votre nouveau mot de passe" required minlength="8">
            <small class="form-text text-muted">Au moins 8 caractères</small>
          </div>
          <div class="form-group mb-3">
            <label for="confirm-password" class="form-label">Confirmer le mot de passe</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="Confirmer le mot de passe" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Changer le mot de passe</button>
        </form>
      </div>
    </div>
  </div>

  <!--   Core JS Files   -->
  <script src="assets/argon/js/core/popper.min.js"></script>
  <script src="assets/argon/js/core/bootstrap.min.js"></script>
  <script type="module" src="assets/js/firebase.js"></script>
  <script type="module" src="assets/js/change-password.js"></script>
</body>

</html>
