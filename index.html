<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/argon/img/gcomaf-icon-48x48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/argon/img/gcomaf-icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/argon/img/gcomaf-icon-16x16.png">
  <link rel="manifest" href="manifest.json">
  <title>CRM Gcomaf - Connexion</title>
  <!--     Fonts and icons     -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <!-- Nucleo Icons -->
  <link href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-icons.css" rel="stylesheet" />
  <link href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-svg.css" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <!-- CSS Files -->
  <link id="pagestyle" href="assets/argon/css/argon-dashboard.css?v=2.1.0" rel="stylesheet" />
  <link href="assets/argon/css/custom.css" rel="stylesheet" />
</head>

<body class="bg-gray-100">
  <div class="login-wrapper">
    <div class="card login-card shadow-lg">
      <div class="card-header text-center pb-0">
        <div class="icon icon-shape icon-lg bg-gradient-primary shadow text-center border-radius-xl mb-3 mx-auto">
          <i class="fas fa-lock text-white text-lg opacity-10"></i>
        </div>
        <h3 class="font-weight-bolder text-dark">Connexion CRM</h3>
        <p class="text-muted mb-0">Accédez à votre espace de gestion</p>
      </div>
      <div class="card-body">
        <div id="error-message" class="alert alert-danger" style="display: none;" role="alert" aria-live="polite"></div>

        <div class="login-sections">
          <div class="login-section admin-section">
            <h5 class="font-weight-bold text-dark mb-3">Administrateur</h5>
            <form id="admin-form">
              <div class="form-group mb-3">
                <label for="admin-email" class="form-label">Email</label>
                <input type="email" id="admin-email" class="form-control" placeholder="votre.email@exemple.com" required autocomplete="email">
              </div>
              <div class="form-group mb-3">
                <label for="admin-password" class="form-label">Mot de passe</label>
                <input type="password" id="admin-password" class="form-control" placeholder="Votre mot de passe" required autocomplete="current-password">
              </div>
              <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
          </div>

          <hr class="my-4">

          <div class="login-section agent-section">
            <h5 class="font-weight-bold text-dark mb-3">Agent / Superviseur</h5>
            <button id="google-login" class="btn-google">
              <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Se connecter avec Google
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!--   Core JS Files   -->
  <script src="assets/argon/js/core/popper.min.js"></script>
  <script src="assets/argon/js/core/bootstrap.min.js"></script>
  <script type="module" src="assets/js/firebase.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
</body>

</html>
