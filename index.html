<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#5e72e4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CRM Gcomaf">
  <meta name="msapplication-TileColor" content="#5e72e4">
  <meta name="msapplication-config" content="/public/browserconfig.xml">
  <!-- Favicon and Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="public/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png">
  <link rel="manifest" href="manifest.json">
  <link rel="mask-icon" href="public/safari-pinned-tab.svg" color="#5e72e4">
  <link rel="shortcut icon" href="favicon.ico">
  <title>CRM Gcomaf - Connexion</title>
  <!--     Fonts and icons     -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <!-- Nucleo Icons -->
  <link href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-icons.css" rel="stylesheet" />
  <link href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-svg.css" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- CSS Files -->
  <link id="pagestyle" href="assets/argon/css/argon-dashboard.css?v=2.1.0" rel="stylesheet" />
  <link href="assets/argon/css/custom.css" rel="stylesheet" />
</head>

<body class="bg-gray-100">
  <div class="login-wrapper">
    <div class="card login-card shadow-lg">
      <div class="card-header text-center pb-0">
        <div class="text-center mb-3">
          <img src="assets/argon/img/logo.png" alt="Gcomaf Logo" class="logo-login">
        </div>
        <h3 class="font-weight-bolder text-dark">Connexion CRM</h3>
        <p class="text-muted mb-0">Accédez à votre espace de gestion</p>
      </div>
      <div class="card-body">
        <div id="error-message" class="alert alert-danger" style="display: none;" role="alert" aria-live="polite"></div>

        <div class="login-sections">
          <div class="login-section">
            <h5 class="font-weight-bold text-dark mb-3">Connexion</h5>
            <form id="login-form">
              <div class="form-group mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="votre.email@exemple.com" required autocomplete="email">
              </div>
              <div class="form-group mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-control" placeholder="Votre mot de passe" required autocomplete="current-password">
              </div>
              <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
          </div>
        </div>

        <!-- Lien vers inscription agent -->
        <div class="text-center mt-4">
          <a href="/gcomaf/register.html" id="go-to-register" class="text-sm text-muted">
            Pas encore inscrit ? <strong>Créer un compte agent</strong>
          </a>
        </div>

        <!-- Bouton d'installation PWA -->
        <div class="text-center mt-3">
          <button id="install-pwa-btn" class="btn btn-outline-primary btn-sm" style="display: none;">
            <i class="fas fa-download me-2"></i>Installer l'App
          </button>
        </div>
      </div>
    </div>
  </div>

  <!--   Core JS Files   -->
  <script src="assets/argon/js/core/popper.min.js"></script>
  <script src="assets/argon/js/core/bootstrap.min.js"></script>
  <script type="module" src="assets/js/firebase.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
</body>

</html>
