<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Inscription Agent - CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Argon CSS -->
  <link href="assets/argon/css/argon-dashboard.css?v=2.1.0" rel="stylesheet" />
  <link href="assets/argon/css/custom.css" rel="stylesheet" />

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100">

  <main class="main-content mt-0">
    <section>
      <div class="page-header min-vh-100">
        <div class="container">
          <div class="row">

            <!-- Col gauche -->
            <div class="col-xl-4 col-lg-5 col-md-7 d-flex flex-column mx-lg-0 mx-auto">
              <div class="card card-plain">

                <!-- Header -->
                <div class="card-header pb-0 text-start">
                  <div class="d-flex align-items-center mb-2">
                    <img src="assets/argon/img/logo.png" width="40" class="me-2" />
                    <h4 class="font-weight-bolder mb-0">Inscription Agent</h4>
                  </div>
                  <p class="mb-0 text-sm">
                    Remplissez le formulaire pour créer votre compte.
                  </p>
                </div>

                <!-- Body -->
                <div class="card-body">

                  <form id="register-form">

                    <!-- Nom -->
                    <div class="mb-3">
                      <input type="text" id="lastName" class="form-control" placeholder="Nom" required>
                    </div>

                    <!-- Prénom -->
                    <div class="mb-3">
                      <input type="text" id="firstName" class="form-control" placeholder="Prénom" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                      <input type="email" id="email" class="form-control" placeholder="Email professionnel" required>
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-3">
                      <input type="password" id="password" class="form-control" placeholder="Mot de passe" required>
                    </div>

                    <!-- Code d'accès -->
                    <div class="mb-3">
                      <input type="text" id="accessCode" class="form-control" placeholder="Code d'accès agent" required>
                    </div>

                    <!-- Erreur -->
                    <div id="error-message" class="alert alert-danger d-none text-sm"></div>

                    <!-- Bouton -->
                    <div class="text-center">
                      <button type="submit" class="btn btn-lg bg-gradient-primary w-100 mt-4 mb-0">
                        Créer mon compte
                      </button>
                    </div>

                  </form>
                </div>

                <!-- Footer -->
                <div class="card-footer text-center pt-0 px-sm-4 px-1">
                  <p class="mb-2 text-sm mx-auto">
                    Déjà inscrit ?
                    <a href="index.html" class="text-primary text-gradient font-weight-bold">
                      Se connecter
                    </a>
                  </p>
                </div>

              </div>
            </div>

            <!-- Col droite -->
            <div class="col-6 d-lg-flex d-none h-100 my-auto pe-0 position-absolute top-0 end-0 text-center justify-content-center flex-column">
              <div class="position-relative bg-gradient-primary h-100 m-3 px-7 border-radius-lg d-flex flex-column justify-content-center">
                <img src="assets/argon/img/shapes/pattern-lines.svg" alt="pattern" class="position-absolute opacity-4 start-0">
                <div class="position-relative">
                  <h4 class="text-white font-weight-bolder mb-2">
                    Bienvenue dans le CRM
                  </h4>
                  <p class="text-white">
                    Votre compte agent vous donne accès à la gestion des prospects et ventes.
                  </p>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- JS Core -->
  <script src="assets/argon/js/core/bootstrap.min.js"></script>
  <script type="module" src="assets/js/firebase.js"></script>
  <script type="module" src="assets/js/register.js"></script>

  <!-- Pré-remplissage du code depuis l'URL -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      if (code) {
        const input = document.getElementById("accessCode");
        if (input) input.value = code;
      }
    });
  </script>

</body>
</html>
